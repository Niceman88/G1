<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이벤트 게임</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --primary:#5b4bda; --primary-dark:#4338ca; --bg:#f4f3ff; --card:#ffffff;
    --text:#1f1b3c; --muted:#7a7593; --danger:#e0445b; --success:#2fb380; --border:#e3e0f7;
    --o-color:#2fb380; --x-color:#e0445b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Apple SD Gothic Neo,sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px;}
  .wrap.wide{max-width:900px;}
  h1{font-size:22px;text-align:center;margin:18px 0 6px;}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(91,75,218,0.06);}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{flex:1;padding:12px;border:none;border-radius:12px;background:#eceaff;color:var(--primary-dark);font-weight:600;cursor:pointer;font-size:14px;}
  .tab-btn.active{background:var(--primary);color:#fff;}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:10px 0 4px;}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;}
  textarea{resize:vertical;min-height:120px;}
  button.btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px;}
  button.btn:hover{background:var(--primary-dark);}
  button.btn.secondary{background:#eceaff;color:var(--primary-dark);}
  button.btn.danger{background:var(--danger);}
  button.btn:disabled{opacity:0.5;cursor:not-allowed;}
  .hidden{display:none !important;}
  .room-code{font-size:32px;font-weight:800;text-align:center;letter-spacing:4px;color:var(--primary);margin:10px 0;}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eceaff;color:var(--primary-dark);font-size:12px;font-weight:700;margin-right:6px;}
  .copy-row{display:flex;gap:8px;}
  .copy-row input{flex:1;}
  .copy-row button{width:auto;padding:10px 14px;margin-top:0;}
  .small-muted{font-size:12px;color:var(--muted);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  th{color:var(--muted);font-size:12px;}
  tr.win td{font-weight:800;color:var(--primary-dark);background:#f4f3ff;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.two-col{grid-template-columns:1fr;}}

  /* 최종 순위 오버레이 */
  .final-overlay{position:fixed;inset:0;background:rgba(31,27,60,0.92);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .final-box{background:#fff;border-radius:24px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:32px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .final-box h2{font-size:28px;margin:0 0 20px;color:var(--primary-dark);}
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:14px;margin-bottom:24px;}
  .podium-item{flex:1;max-width:140px;}
  .podium-medal{font-size:36px;}
  .podium-name{font-weight:800;font-size:16px;margin:6px 0 2px;word-break:keep-all;}
  .podium-score{font-size:13px;color:var(--muted);font-weight:700;}
  .podium-bar{border-radius:12px 12px 0 0;margin-top:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px;}
  .podium-bar.gold{background:linear-gradient(180deg,#ffd76a,#f5a623);height:120px;}
  .podium-bar.silver{background:linear-gradient(180deg,#dfe3ee,#aab2c8);height:90px;}
  .podium-bar.bronze{background:linear-gradient(180deg,#e8b48a,#c97f4d);height:65px;}

  .winner-row{display:flex;align-items:center;gap:14px;padding:10px 8px;border-bottom:1px solid var(--border);text-align:left;}
  .winner-rank{width:50px;flex-shrink:0;font-size:18px;font-weight:900;color:var(--primary-dark);text-align:center;}
  .winner-name{flex:1;font-size:15px;font-weight:700;}
  .coupon{width:130px;height:74px;border-radius:10px;flex-shrink:0;position:relative;
    background:linear-gradient(135deg,#e8fdfb,#bdf3ee);border:1px solid #5fd6cc;
    display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
  .coupon .brand{font-size:11px;font-weight:900;color:#0c8a7f;letter-spacing:0.3px;}
  .coupon .amount{font-size:15px;font-weight:900;color:#066158;margin-top:2px;}
  .final-rest-list{text-align:left;border-top:1px solid var(--border);padding-top:14px;margin-top:6px;}
  .final-rest-row{display:flex;justify-content:space-between;padding:8px 4px;font-size:15px;border-bottom:1px solid var(--border);}
  .final-rest-row b{color:var(--primary-dark);}
  .final-close-btn{margin-top:20px;}

  /* 진행자: 문제 표출 */
  .q-stage{text-align:center;padding:30px 10px;}
  .q-index{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:6px;}
  .q-text{font-size:26px;font-weight:800;margin-bottom:14px;line-height:1.3;}
  .q-status{font-size:14px;color:var(--muted);}
  .answer-reveal{display:flex;justify-content:center;gap:24px;margin-top:16px;}
  .answer-badge{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#fff;}
  .answer-badge.o{background:var(--o-color);}
  .answer-badge.x{background:var(--x-color);}
  .answer-badge.dim{opacity:0.25;}

  /* 참가자: OX 버튼 */
  .ox-buttons{display:flex;gap:14px;margin:20px 0;}
  .ox-btn{flex:1;aspect-ratio:1;border-radius:24px;border:none;font-size:64px;font-weight:900;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .ox-btn.o{background:var(--o-color);}
  .ox-btn.x{background:var(--x-color);}
  .ox-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .ox-btn.selected{outline:5px solid #1f1b3c;}
  .p-status-banner{text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:16px;margin-bottom:14px;}
  .p-status-banner.correct{background:#e6f8f0;color:var(--success);}
  .p-status-banner.wrong{background:#fdeaec;color:var(--danger);}
  .p-status-banner.waiting{background:#eceaff;color:var(--primary-dark);}
  .score-pill{text-align:center;font-size:14px;color:var(--muted);margin-bottom:6px;}
</style>
</head>
<body>

<div class="wrap" id="entryWrap">
  <h1>🎮 이벤트 게임</h1>
  <div class="sub">진행자라면 [방 만들기], 참가자라면 [참가하기]</div>
  <div class="tabs">
    <button class="tab-btn active" id="tabHost">👑 방 만들기 (진행자)</button>
    <button class="tab-btn" id="tabPlayer">🙋 참가하기</button>
  </div>

  <div class="card" id="hostCreatePanel">
    <label>문제 목록 (한 줄에 하나씩, 형식: 문제 / O 또는 X)</label>
    <textarea id="questionInput" placeholder="예시
우리 회사 창립연도는 2015년이다 / O
이번 워크숍 장소는 제주도이다 / X
오늘 행사 참석 인원은 150명 이상이다 / O"></textarea>
    <div class="small-muted" id="qCountInfo">입력된 문제: 0개</div>
    <button class="btn" id="createRoomBtn">방 만들기</button>
    <div class="small-muted" id="createError" style="color:var(--danger);margin-top:8px;"></div>
  </div>

  <div class="card hidden" id="playerJoinPanel">
    <label>방 코드</label>
    <input id="joinRoomCode" placeholder="예: 4821" maxlength="4" inputmode="numeric">
    <label>이름 (본명으로 입력해주세요)</label>
    <input id="joinName" placeholder="홍길동">
    <button class="btn" id="joinRoomBtn">입장하기</button>
    <div class="small-muted" id="joinError" style="color:var(--danger);margin-top:8px;"></div>
  </div>
</div>

<!-- ===================== HOST DASHBOARD ===================== -->
<div class="wrap wide hidden" id="hostDashboard">
  <h1>👑 진행자 화면</h1>
  <div class="card">
    <div style="text-align:center;">
      <span class="pill">방 코드</span>
      <div class="room-code" id="dashRoomCode">----</div>
      <div class="copy-row">
        <input id="dashJoinUrl" readonly>
        <button class="btn secondary" id="copyUrlBtn">URL 복사</button>
      </div>
      <div class="small-muted">참가자는 위 URL로 접속하거나, 방 코드를 직접 입력하면 됩니다.</div>
    </div>
  </div>

  <div class="card">
    <div class="q-stage" id="hostQStage">
      <div class="q-index" id="hostQIndex">대기 중</div>
      <div class="q-text" id="hostQText">아래 [문제 시작] 버튼을 눌러주세요</div>
      <div class="q-status" id="hostQStatus"></div>
      <div class="answer-reveal hidden" id="hostAnswerReveal">
        <div class="answer-badge o dim" id="badgeO">O</div>
        <div class="answer-badge x dim" id="badgeX">X</div>
      </div>
    </div>
    <div class="two-col">
      <button class="btn" id="nextQBtn">▶ 문제 시작 / 다음 문제</button>
      <button class="btn secondary" id="revealBtn">✅ 정답 공개 & 채점</button>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <h3 style="margin-top:0;">📊 실시간 응답 현황</h3>
      <div style="text-align:center;font-size:32px;font-weight:800;color:var(--primary-dark);">
        <span id="answeredCount">0</span> / <span id="playerCount">0</span>
      </div>
      <div class="small-muted" style="text-align:center;">응답 완료 / 전체 접속 인원</div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">🏆 실시간 순위</h3>
      <table>
        <thead><tr><th>순위</th><th>이름</th><th>정답 수</th></tr></thead>
        <tbody id="rankTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <button class="btn secondary" id="showFinalBtn">🎁 최종 결과 (상품 공개)</button>
    <button class="btn danger" id="resetRoomBtn">방 초기화 (새 게임)</button>
  </div>
</div>

<div class="final-overlay hidden" id="finalOverlay">
  <div class="final-box">
    <h2>🎁 최종 결과 발표</h2>
    <div id="winnerListBox"></div>
    <button class="btn final-close-btn" id="closeFinalBtn">닫기</button>
  </div>
</div>

<!-- ===================== PLAYER SCREEN ===================== -->
<div class="wrap hidden" id="playerScreen">
  <h1>🎮 <span id="pRoomLabel"></span></h1>
  <div class="score-pill">내 닉네임: <b id="pNameLabel"></b> · 현재 점수: <b id="pScoreLabel">0</b>점</div>
  <div id="pBanner"></div>

  <div class="card" id="pWaitCard">
    <div style="text-align:center;padding:30px 10px;">
      <div style="font-size:40px;margin-bottom:10px;">⏳</div>
      <div style="font-size:17px;font-weight:800;margin-bottom:6px;">참가 완료! 잠시만 기다려주세요</div>
      <div class="small-muted">진행자가 게임을 시작하면<br>자동으로 화면이 전환됩니다.</div>
    </div>
  </div>

  <div class="card hidden" id="pQuizCard">
    <div class="q-index" id="pQIndex" style="text-align:center;color:var(--muted);font-weight:700;font-size:13px;"></div>
    <div class="q-text" id="pQText" style="text-align:center;font-size:20px;font-weight:800;margin:10px 0 4px;"></div>
    <div class="ox-buttons">
      <button class="ox-btn o" id="oBtn">O</button>
      <button class="ox-btn x" id="xBtn">X</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBagSV-mmRykgR5dZ8oQJW-aMFClS13Ojw",
  authDomain: "company-bingo-e8ea2.firebaseapp.com",
  databaseURL: "https://company-bingo-e8ea2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "company-bingo-e8ea2",
  storageBucket: "company-bingo-e8ea2.firebasestorage.app",
  messagingSenderId: "318440692637",
  appId: "1:318440692637:web:170c86c3bcbbbf33056d74",
  measurementId: "G-9NDMF44S46"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function genRoomCode(){ return String(Math.floor(1000 + Math.random()*9000)); }
function genPlayerId(){ return 'p_' + Math.random().toString(36).slice(2,10); }
function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

let myRoomCode = null;
let myPlayerId = null;
let myName = '';
let myScore = 0;
let currentQIndexSeen = -1;

/* ---------------- 탭 전환 ---------------- */
document.getElementById('tabHost').onclick = ()=>{
  document.getElementById('tabHost').classList.add('active');
  document.getElementById('tabPlayer').classList.remove('active');
  document.getElementById('hostCreatePanel').classList.remove('hidden');
  document.getElementById('playerJoinPanel').classList.add('hidden');
};
document.getElementById('tabPlayer').onclick = ()=>{
  document.getElementById('tabPlayer').classList.add('active');
  document.getElementById('tabHost').classList.remove('active');
  document.getElementById('playerJoinPanel').classList.remove('hidden');
  document.getElementById('hostCreatePanel').classList.add('hidden');
};

document.getElementById('questionInput').addEventListener('input', (e)=>{
  const lines = e.target.value.split('\n').map(l=>l.trim()).filter(Boolean);
  document.getElementById('qCountInfo').textContent = `입력된 문제: ${lines.length}개`;
});

window.addEventListener('DOMContentLoaded', ()=>{
  const params = new URLSearchParams(location.search);
  const roomParam = params.get('room');
  if(roomParam){
    document.getElementById('tabPlayer').click();
    document.getElementById('joinRoomCode').value = roomParam;
  }
});

/* =========================================================
   1) 호스트: 방 만들기
========================================================= */
document.getElementById('createRoomBtn').onclick = async ()=>{
  const errBox = document.getElementById('createError');
  errBox.textContent = '';
  const raw = document.getElementById('questionInput').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(raw.length === 0){ errBox.textContent = '문제를 최소 1개 이상 입력해주세요.'; return; }

  const questions = [];
  for(const line of raw){
    const parts = line.split('/');
    if(parts.length < 2){ errBox.textContent = `형식 오류: "${line}" → "문제 / O" 형식으로 입력해주세요.`; return; }
    const answer = parts.pop().trim().toUpperCase();
    const qtext = parts.join('/').trim();
    if(answer !== 'O' && answer !== 'X'){ errBox.textContent = `정답은 O 또는 X만 가능합니다: "${line}"`; return; }
    questions.push({ text: qtext, answer });
  }

  const roomCode = genRoomCode();
  await db.ref('oxquiz_rooms/'+roomCode).set({
    questions,
    currentIndex: -1,        // -1 = 시작 전
    phase: 'waiting',        // waiting -> answering -> revealed
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });
  myRoomCode = roomCode;
  enterHostDashboard(roomCode, questions);
};

function enterHostDashboard(roomCode, questions){
  document.getElementById('entryWrap').classList.add('hidden');
  document.getElementById('hostDashboard').classList.remove('hidden');
  document.getElementById('dashRoomCode').textContent = roomCode;
  const joinUrl = location.origin + location.pathname + '?room=' + roomCode;
  document.getElementById('dashJoinUrl').value = joinUrl;
  document.getElementById('copyUrlBtn').onclick = ()=>{
    navigator.clipboard.writeText(joinUrl);
    alert('URL이 복사되었습니다. PPT에 붙여넣으세요.');
  };

  let curIndex = -1;

  document.getElementById('nextQBtn').onclick = async ()=>{
    curIndex++;
    if(curIndex >= questions.length){
      document.getElementById('hostQIndex').textContent = '🎉 모든 문제 종료';
      document.getElementById('hostQText').textContent = '게임이 끝났습니다. 최종 순위를 확인하세요!';
      document.getElementById('hostQStatus').textContent = '';
      document.getElementById('nextQBtn').disabled = true;
      await db.ref(`oxquiz_rooms/${roomCode}`).update({ phase:'ended' });
      return;
    }
    const q = questions[curIndex];
    document.getElementById('hostQIndex').textContent = `문제 ${curIndex+1} / ${questions.length}`;
    document.getElementById('hostQText').textContent = q.text;
    document.getElementById('hostQStatus').textContent = '참가자들이 답변 중입니다...';
    document.getElementById('hostAnswerReveal').classList.add('hidden');
    document.getElementById('badgeO').classList.add('dim');
    document.getElementById('badgeX').classList.add('dim');

    await db.ref(`oxquiz_rooms/${roomCode}`).update({
      currentIndex: curIndex,
      phase: 'answering'
    });
  };

  document.getElementById('revealBtn').onclick = async ()=>{
    if(curIndex < 0) return;
    const q = questions[curIndex];
    document.getElementById('hostQStatus').textContent = '정답이 공개되었습니다!';
    document.getElementById('hostAnswerReveal').classList.remove('hidden');
    document.getElementById('badgeO').classList.toggle('dim', q.answer !== 'O');
    document.getElementById('badgeX').classList.toggle('dim', q.answer !== 'X');

    await db.ref(`oxquiz_rooms/${roomCode}`).update({ phase:'revealed' });

    // 채점: 해당 문제에 정답 맞춘 사람 점수 +1 (개별 경로로 안전하게 갱신)
    const playersSnap = await db.ref(`oxquiz_rooms/${roomCode}/players`).get();
    const players = playersSnap.val() || {};
    const tasks = [];
    Object.keys(players).forEach(pid=>{
      const p = players[pid];
      const ans = (p.answers || {})[curIndex];
      if(ans && ans.choice === q.answer){
        const newScore = (p.score||0) + 1;
        tasks.push(db.ref(`oxquiz_rooms/${roomCode}/players/${pid}/score`).set(newScore));
      }
    });
    if(tasks.length){
      await Promise.all(tasks);
    }
  };

  function prizeForRank(rank){
    if(rank === 1) return 50000;
    if(rank === 2 || rank === 3) return 30000;
    if(rank >= 4 && rank <= 23) return 20000;
    return 0;
  }

  document.getElementById('showFinalBtn').onclick = async ()=>{
    const playersSnap = await db.ref(`oxquiz_rooms/${roomCode}/players`).get();
    const players = playersSnap.val() || {};
    const sorted = Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
    const winners = sorted.slice(0, 23);

    if(winners.length === 0){
      document.getElementById('winnerListBox').innerHTML = '<div class="small-muted" style="padding:20px;">참가자가 없습니다.</div>';
    } else {
      document.getElementById('winnerListBox').innerHTML = winners.map((p,i)=>{
        const rank = i+1;
        const amount = prizeForRank(rank);
        return `
          <div class="winner-row">
            <div class="winner-rank">${rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank+'등'}</div>
            <div class="winner-name">${escapeHtml(p.name||'-')} <span class="small-muted">(${p.score||0}점)</span></div>
            <div class="coupon">
              <div class="brand">배달의민족 쿠폰</div>
              <div class="amount">${amount.toLocaleString()}원</div>
            </div>
          </div>`;
      }).join('');
    }
    document.getElementById('finalOverlay').classList.remove('hidden');
  };
  document.getElementById('closeFinalBtn').onclick = ()=>{
    document.getElementById('finalOverlay').classList.add('hidden');
  };

  document.getElementById('resetRoomBtn').onclick = async ()=>{
    if(!confirm('정말 방을 초기화할까요? 모든 참가자 데이터가 사라집니다.')) return;
    await db.ref('oxquiz_rooms/'+roomCode).remove();
    location.reload();
  };

  // 실시간 참가자/응답 현황
  db.ref(`oxquiz_rooms/${roomCode}/players`).on('value', snap=>{
    const players = snap.val() || {};
    const arr = Object.values(players);
    document.getElementById('playerCount').textContent = arr.length;

    let answered=0;
    arr.forEach(p=>{
      const ans = (p.answers || {})[curIndex];
      if(ans) answered++;
    });
    document.getElementById('answeredCount').textContent = answered;

    const sorted = [...arr].sort((a,b)=> (b.score||0)-(a.score||0));
    document.getElementById('rankTableBody').innerHTML = sorted.map((p,i)=>{
      const cls = (i===0 && p.score>0) ? 'win' : '';
      return `<tr class="${cls}"><td>${i+1}</td><td>${escapeHtml(p.name||'-')}</td><td>${p.score||0}</td></tr>`;
    }).join('');
  });
}

/* =========================================================
   2) 참가자: 입장
========================================================= */
document.getElementById('joinRoomBtn').onclick = async ()=>{
  const code = document.getElementById('joinRoomCode').value.trim();
  const name = document.getElementById('joinName').value.trim();
  const errBox = document.getElementById('joinError');
  errBox.textContent = '';
  if(!code || !name){ errBox.textContent = '방 코드와 이름을 모두 입력해주세요.'; return; }

  const roomSnap = await db.ref('oxquiz_rooms/'+code).get();
  if(!roomSnap.exists()){ errBox.textContent = '존재하지 않는 방 코드입니다.'; return; }

  myRoomCode = code;
  myPlayerId = genPlayerId();
  myName = name;

  await db.ref(`oxquiz_rooms/${code}/players/${myPlayerId}`).set({
    name, score: 0, answers: {}, joinedAt: firebase.database.ServerValue.TIMESTAMP
  });

  enterPlayerScreen();
};

function enterPlayerScreen(){
  document.getElementById('entryWrap').classList.add('hidden');
  document.getElementById('playerScreen').classList.remove('hidden');
  document.getElementById('pRoomLabel').textContent = `방 ${myRoomCode}`;
  document.getElementById('pNameLabel').textContent = myName;

  db.ref(`oxquiz_rooms/${myRoomCode}/players/${myPlayerId}/score`).on('value', snap=>{
    myScore = snap.val() || 0;
    document.getElementById('pScoreLabel').textContent = myScore;
  });

  db.ref(`oxquiz_rooms/${myRoomCode}`).on('value', snap=>{
    const room = snap.val();
    if(!room) return;
    renderPlayerPhase(room);
  });
}

async function renderPlayerPhase(room){
  const idx = room.currentIndex;
  const phase = room.phase;
  const banner = document.getElementById('pBanner');
  const waitCard = document.getElementById('pWaitCard');
  const quizCard = document.getElementById('pQuizCard');

  if(phase === 'ended'){
    waitCard.classList.add('hidden');
    quizCard.classList.add('hidden');
    banner.innerHTML = `<div class="p-status-banner waiting">🎉 모든 문제가 끝났습니다! 최종 점수: ${myScore}점</div>`;
    return;
  }

  if(idx < 0 || !room.questions || !room.questions[idx]){
    waitCard.classList.remove('hidden');
    quizCard.classList.add('hidden');
    return;
  }

  const q = room.questions[idx];

  if(phase === 'answering'){
    waitCard.classList.add('hidden');
    quizCard.classList.remove('hidden');
    document.getElementById('pQIndex').textContent = `문제 ${idx+1} / ${room.questions.length}`;
    document.getElementById('pQText').textContent = q.text;

    // 새 문제로 넘어왔을 때만 버튼 초기화
    if(currentQIndexSeen !== idx){
      currentQIndexSeen = idx;
      const oBtn = document.getElementById('oBtn');
      const xBtn = document.getElementById('xBtn');
      oBtn.disabled = false; xBtn.disabled = false;
      oBtn.classList.remove('selected'); xBtn.classList.remove('selected');
      banner.innerHTML = '';

      oBtn.onclick = ()=>submitAnswer(idx, 'O');
      xBtn.onclick = ()=>submitAnswer(idx, 'X');
    }

    // 이미 답했는지 체크
    const mySnap = await db.ref(`oxquiz_rooms/${myRoomCode}/players/${myPlayerId}/answers/${idx}`).get();
    if(mySnap.exists()){
      const myChoice = mySnap.val().choice;
      document.getElementById('oBtn').disabled = true;
      document.getElementById('xBtn').disabled = true;
      document.getElementById(myChoice==='O' ? 'oBtn':'xBtn').classList.add('selected');
      banner.innerHTML = `<div class="p-status-banner waiting">제출 완료! 정답 공개를 기다려주세요.</div>`;
    }
  } else if(phase === 'revealed'){
    quizCard.classList.add('hidden');
    waitCard.classList.add('hidden');
    const mySnap = await db.ref(`oxquiz_rooms/${myRoomCode}/players/${myPlayerId}/answers/${idx}`).get();
    const myChoice = mySnap.exists() ? mySnap.val().choice : null;
    const correct = myChoice === q.answer;
    if(!myChoice){
      banner.innerHTML = `<div class="p-status-banner wrong">⏱️ 시간 내에 응답하지 못했습니다. 정답: ${q.answer}</div>`;
    } else if(correct){
      banner.innerHTML = `<div class="p-status-banner correct">🎉 정답입니다! (${q.answer})</div>`;
    } else {
      banner.innerHTML = `<div class="p-status-banner wrong">❌ 오답입니다. 정답: ${q.answer}</div>`;
    }
  }
}

async function submitAnswer(idx, choice){
  document.getElementById('oBtn').disabled = true;
  document.getElementById('xBtn').disabled = true;
  document.getElementById(choice==='O' ? 'oBtn':'xBtn').classList.add('selected');
  await db.ref(`oxquiz_rooms/${myRoomCode}/players/${myPlayerId}/answers/${idx}`).set({
    choice, submittedAt: firebase.database.ServerValue.TIMESTAMP
  });
  document.getElementById('pBanner').innerHTML = `<div class="p-status-banner waiting">제출 완료! 정답 공개를 기다려주세요.</div>`;
}
</script>
